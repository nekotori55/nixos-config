# Bogster theme – dynamic UI, fixed syntax/markup/diagnostics
# UI uses correct matugen variable syntax: colors.<name>.default.hex

# =====================================================================
# THEME KEYS (syntax unchanged, UI points to dynamic palette names)
# =====================================================================

# -------- Syntax (exactly as original Bogster) --------
"attribute" = "bogster-orange"
"keyword" = { fg = "bogster-yellow", modifiers = ["bold"] }
"keyword.directive" = "bogster-yellow"
"namespace" = "bogster-red"
"punctuation" = "bogster-orange"
"punctuation.delimiter" = "bogster-orange"
"operator" = { fg = "bogster-orange", modifiers = ["bold"] }
"special" = "bogster-lgreen"
"variable.other.member" = "bogster-fg0"
"variable" = "bogster-fg0"
"variable.parameter" = "bogster-fg0"
"type" = "bogster-lred"
"type.builtin" = { fg = "bogster-red", modifiers = ["bold"] }
"constructor" = "bogster-lred"
"function" = "bogster-lblue"
"function.macro" = { fg = "bogster-orange", modifiers = ["bold"] }
"function.builtin" = { fg = "bogster-lblue", modifiers = ["bold"] }
"comment" = "bogster-base5"
"variable.builtin" = "bogster-fg0"
"constant" = "bogster-teal"
"constant.builtin" = "bogster-teal"
"string" = "bogster-teal"
"constant.numeric" = "bogster-blue"
"constant.character.escape" = { fg = "bogster-lgreen", modifiers = ["bold"] }
"label" = "bogster-blue"
"module" = "bogster-red"

# -------- Markup (unchanged) --------
"markup.heading" = "bogster-blue"
"markup.list" = "bogster-red"
"markup.bold" = { fg = "bogster-yellow", modifiers = ["bold"] }
"markup.italic" = { fg = "bogster-purp", modifiers = ["italic"] }
"markup.strikethrough" = { modifiers = ["crossed_out"] }
"markup.link.url" = { fg = "bogster-yellow", modifiers = ["underlined"] }
"markup.link.text" = "bogster-red"
"markup.quote" = "bogster-teal"
"markup.raw" = "bogster-lgreen"

# -------- Diff (unchanged) --------
"diff.plus" = "bogster-teal"
"diff.delta" = "bogster-orange"
"diff.minus" = "bogster-lred"

# ====== UI ELEMENTS (dynamic, using correct matugen syntax) ======
"ui.background" = { bg = "ui-bg-alt" }

"ui.linenr" = { fg = "ui-dim" }
"ui.linenr.selected" = { fg = "ui-accent" }

"ui.cursorline" = { bg = "ui-cursorline" }

"ui.statusline" = { fg = "ui-fg", bg = "ui-bg-container" }
"ui.statusline.inactive" = { fg = "ui-dim", bg = "ui-bg-alt" }

"ui.popup" = { bg = "ui-bg-alt" }
"ui.window" = { bg = "ui-bg-alt" }
"ui.help" = { bg = "ui-bg-alt", fg = "ui-fg" }

"ui.statusline.normal" = { fg = "ui-on-accent", bg = "ui-accent", modifiers = ["bold"] }
"ui.statusline.insert" = { fg = "ui-on-tertiary", bg = "ui-tertiary", modifiers = ["bold"] }
"ui.statusline.select" = { fg = "ui-on-secondary", bg = "ui-secondary", modifiers = ["bold"] }

"ui.text" = { fg = "ui-fg" }
"ui.text.focus" = { fg = "ui-accent", modifiers = ["bold"] }

"ui.virtual.whitespace" = "ui-whitespace"
"ui.virtual.ruler" = { bg = "ui-ruler" }
"ui.virtual.jump-label" = { fg = "ui-jump-label-fg", bg = "ui-jump-label-bg", modifiers = ["bold"] }

"ui.selection" = { fg ="none" ,bg = "ui-selection" }
"ui.selection.primary" = { bg = "ui-selection-secondary" }

"ui.cursor.match" = { fg = "ui-cursor-match-fg", bg = "ui-cursor-match-bg" }
"ui.cursor" = { fg = "ui-cursor-fg", bg = "ui-cursor-bg" }

"ui.menu" = { fg = "ui-fg", bg = "ui-bg-alt" }
"ui.menu.selected" = { fg = "ui-on-accent", bg = "ui-accent", modifiers = ["bold"] }

# -------- Diagnostics (unchanged) --------
"warning" = "bogster-orange"
"error" = "bogster-lred"
"info" = "bogster-teal"
"hint" = "bogster-blue"

"diagnostic.warning" = { underline = { color = "bogster-orange", style = "curl" } }
"diagnostic.error" = { underline = { color = "bogster-lred", style = "curl" } }
"diagnostic.info" = { underline = { color = "bogster-teal", style = "curl" } }
"diagnostic.hint" = { underline = { color = "bogster-blue", style = "curl" } }
"diagnostic.unnecessary" = { modifiers = ["dim"] }
"diagnostic.deprecated" = { modifiers = ["crossed_out"] }

[palette]
# -------- Bogster palette (fixed, syntax & markup) --------
bogster-yellow = "#dcb659"
bogster-lblue = "#59dcd8"
bogster-teal = "#59dcb7"
bogster-blue = "#36b2d4"
bogster-orange = "#dc7759"
bogster-red = "#d32c5d"
bogster-lgreen = "#7fdc59"
bogster-lred = "#dc597f"
bogster-purp = "#b759dc"

bogster-base0 = "#13181e"
bogster-base1 = "#161c23"
bogster-base2 = "#232d38"
bogster-base3 = "#313f4e"
bogster-base4 = "#415367"
bogster-base5 = "#abb2bf"

bogster-fg0 = "#c6b8ad"
bogster-fg1 = "#e5ded6"

# -------- UI palette (dynamic, generated by matugen) --------
ui-bg = "{{ colors.surface_dim.default.hex }}"
ui-bg-alt = "{{ colors.surface.default.hex }}"
ui-bg-bright = "{{ colors.surface_bright.default.hex }}"
ui-bg-container = "{{ colors.surface_container.default.hex }}"

ui-fg = "{{ colors.on_surface.default.hex }}"
ui-dim = "{{ colors.on_surface_variant.default.hex }}"
ui-accent = "{{ colors.primary.default.hex }}"
ui-on-accent = "{{ colors.on_primary.default.hex }}"
ui-secondary = "{{ colors.secondary.default.hex }}"
ui-on-secondary = "{{ colors.on_secondary.default.hex }}"
ui-tertiary = "{{ colors.tertiary.default.hex }}"
ui-on-tertiary = "{{ colors.on_tertiary.default.hex }}"
ui-container = "{{ colors.primary_container.default.hex }}"
ui-on-container = "{{ colors.on_primary_container.default.hex }}"
ui-secondary-container = "{{ colors.secondary_container.default.hex }}"
ui-on-secondary-container = "{{ colors.on_secondary_container.default.hex }}"

ui-cursorline        = "{{ colors.surface_container_low.default.hex }}"
ui-ruler             = "{{ colors.surface_container_low.default.hex }}"
ui-whitespace        = "{{ colors.outline_variant.default.hex }}"
ui-jump-label-fg     = "{{ colors.on_primary.default.hex }}"
ui-jump-label-bg     = "{{ colors.primary.default.hex }}"
ui-selection         = "{{ colors.primary_container.default.hex }}"
ui-selection-secondary = "{{ colors.secondary_container.default.hex }}"
ui-cursor-fg         = "{{ colors.background.default.hex }}"
ui-cursor-bg         = "{{ colors.primary.default.hex }}"
ui-cursor-match-fg   = "{{ colors.on_secondary_container.default.hex }}"
ui-cursor-match-bg   = "{{ colors.secondary.default.hex }}"

